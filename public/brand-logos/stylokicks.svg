  <path d="M11 18 h14 v18 c0 2-2 4-4 4 h-6 c-2 0-4-2-4-4 z" stroke="url(#stylo-grad)" stroke-width="2" fill="none"/>
  <path d="M14 26 q4 4 8 0" stroke="url(#stylo-grad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="38" y="27" font-family="'Poppins', 'Inter', system-ui, sans-serif" font-weight="900" font-size="16" fill="#0f172a" letter-spacing="0.5">STYLO</text>
  <text x="96" y="27" font-family="'Poppins', 'Inter', system-ui, sans-serif" font-weight="900" font-size="16" fill="#dc2626" letter-spacing="0.5">KICKS</text>
  <text x="38" y="39" font-family="'Poppins', 'Inter', system-ui, sans-serif" font-weight="500" font-size="7.5" fill="#64748b" letter-spacing="0.8">STYLE MAKES CONFIDENCE</text>
</svg>
