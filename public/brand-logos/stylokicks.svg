<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50" fill="none">
  <!-- Stylokicks Logo -->
  <defs>
    <linearGradient id="stylo-grad" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Shopping bag / shoe icon -->
  <path d="M12 18 h12 v16 h-12 z" fill="url(#stylo-grad)" opacity="0.15"/>
